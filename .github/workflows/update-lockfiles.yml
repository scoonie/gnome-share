name: Update Package Locks

on:
  push:
    branches:
      - main
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
  workflow_dispatch: 

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate Backend Lockfile
        working-directory: ./backend
        run: npm install --package-lock-only --ignore-scripts

      - name: Generate Frontend Lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --ignore-scripts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: auto-update package-lock.json"
          title: "chore: update package-lock.json dependencies"
          body: "This PR automatically updates the `package-lock.json` files to match changes in your `package.json`."
          branch: "bot/update-locks"
          delete-branch: true 
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          add-paths: |
            backend/package-lock.json
            frontend/package-lock.json
