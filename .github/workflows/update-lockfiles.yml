name: Update Package Locks

on:
  push:
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
  workflow_dispatch: 

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pull-requests: write # <-- Added permission to create PRs

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Backend Lockfile
        working-directory: ./backend
        run: npm install --package-lock-only --ignore-scripts

      - name: Generate Frontend Lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only --ignore-scripts

      # --- CHANGED STEP ---
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-update package-lock.json"
          title: "chore: update package-lock.json dependencies"
          body: "This PR automatically updates the `package-lock.json` files to match changes in your `package.json`."
          branch: "bot/update-locks" # The branch it will temporarily create
          delete-branch: true # Deletes the branch after you merge it
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
